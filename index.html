<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Reading RPG</title>
  <style>
    @font-face {
      font-family: 'OpenDyslexic';
      src: url('/fonts/OpenDyslexic-Regular.woff2') format('woff2');
      font-weight: normal;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'OpenDyslexic', 'Comic Sans MS', cursive;
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
    }

    /* Phaser canvas sits here */
    #game-container canvas {
      display: block;
    }

    /* HTML overlay on top of canvas */
    #ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none; /* pass clicks through by default */
      z-index: 10;
    }

    /* Panels inside overlay enable pointer events when visible */
    #ui-overlay .panel {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
